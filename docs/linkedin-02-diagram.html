<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a1a;
      font-family: 'Pretendard Variable', -apple-system, sans-serif;
    }
    @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css');
  </style>
</head>
<body>
  <svg viewBox="0 0 900 560" width="900" height="560" xmlns="http://www.w3.org/2000/svg">

    <!-- Background -->
    <rect width="900" height="560" rx="16" fill="#1a1a1a"/>

    <!-- Title -->
    <text x="450" y="50" text-anchor="middle" font-size="28" font-weight="700" fill="#c9a827">시장조성 자동화</text>
    <text x="450" y="80" text-anchor="middle" font-size="15" fill="#aaa">종목마다, 장중 내내, 시스템이 반복합니다</text>

    <!-- Row 1 -->
    <!-- Card 1 -->
    <rect x="40" y="110" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="137" y="145" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">이론가 변동</text>
    <text x="137" y="170" text-anchor="middle" font-size="13" fill="#ddd">기초자산 움직이면</text>
    <text x="137" y="188" text-anchor="middle" font-size="13" fill="#ddd">호가 자동 조정</text>

    <!-- Card 2 -->
    <rect x="255" y="110" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="352" y="145" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">체결 발생</text>
    <text x="352" y="170" text-anchor="middle" font-size="13" fill="#ddd">체결 시 스큐 자동 이동</text>
    <text x="352" y="188" text-anchor="middle" font-size="13" fill="#ddd">수량 자동 보충</text>

    <!-- Card 3 -->
    <rect x="470" y="110" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="567" y="145" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">그릭스 관리</text>
    <text x="567" y="170" text-anchor="middle" font-size="13" fill="#ddd">한도 초과 시</text>
    <text x="567" y="188" text-anchor="middle" font-size="13" fill="#ddd">자동 헤지</text>

    <!-- Card 4 -->
    <rect x="685" y="110" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="782" y="145" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">만기 도래</text>
    <text x="782" y="170" text-anchor="middle" font-size="13" fill="#ddd">자동 청산 · 롤오버</text>
    <text x="782" y="188" text-anchor="middle" font-size="13" fill="#ddd">위클리 만기 대응</text>

    <!-- Row 2 -->
    <!-- Card 5 -->
    <rect x="40" y="240" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="137" y="275" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">스프레드 관리</text>
    <text x="137" y="300" text-anchor="middle" font-size="13" fill="#ddd">의무 스프레드 준수</text>
    <text x="137" y="318" text-anchor="middle" font-size="13" fill="#ddd">점수 최적화</text>

    <!-- Card 6 -->
    <rect x="255" y="240" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="352" y="275" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">공매도 · 잔고</text>
    <text x="352" y="300" text-anchor="middle" font-size="13" fill="#ddd">공매도 한도</text>
    <text x="352" y="318" text-anchor="middle" font-size="13" fill="#ddd">순보유잔고 실시간 추적</text>

    <!-- Card 7 -->
    <rect x="470" y="240" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="567" y="275" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">커스텀 프라이싱</text>
    <text x="567" y="300" text-anchor="middle" font-size="13" fill="#ddd">종목별</text>
    <text x="567" y="318" text-anchor="middle" font-size="13" fill="#ddd">이론가 전략 설정</text>

    <!-- Card 8 -->
    <rect x="685" y="240" width="195" height="105" rx="12" fill="#2a2a2a" stroke="#c9a827" stroke-width="1.5"/>
    <text x="782" y="275" text-anchor="middle" font-size="17" font-weight="700" fill="#c9a827">커스텀 헤지</text>
    <text x="782" y="300" text-anchor="middle" font-size="13" fill="#ddd">종목별</text>
    <text x="782" y="318" text-anchor="middle" font-size="13" fill="#ddd">헤지 룰 설정</text>

    <!-- Divider -->
    <line x1="80" y1="385" x2="820" y2="385" stroke="#333" stroke-width="1"/>

    <!-- Bottom summary -->
    <text x="450" y="425" text-anchor="middle" font-size="18" font-weight="700" fill="#fff">이 사이클이 수백 종목에서 동시에 돌아갑니다</text>
    <text x="450" y="455" text-anchor="middle" font-size="15" fill="#aaa">09:05 ~ 15:20 · 장중 내내 · 종목별 독립 실행</text>

    <!-- Result box -->
    <rect x="250" y="480" width="400" height="52" rx="12" fill="#c9a827"/>
    <text x="450" y="512" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a1a">트레이더는 예외와 판단에만 집중</text>
  </svg>
</body>
</html>
